<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Prompt Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    color: #333;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #444;
    margin-bottom: 5px;
    font-size: 24px;
  }

  p.subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 25px;
  }

  .card {
    background: white;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }

  label {
    font-weight: bold;
    display: block;
    margin-bottom: 8px;
    color: #555;
    font-size: 14px;
  }

  select, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    color: #333;
    background: white;
    outline: none;
  }

  select:focus, textarea:focus {
    border-color: #4a90e2;
  }

  textarea {
    height: 120px;
    resize: vertical;
    margin-bottom: 5px;
  }

  .char-info {
    font-size: 12px;
    color: #aaa;
    text-align: right;
    margin-bottom: 12px;
  }

  button#generateBtn {
    width: 100%;
    padding: 12px;
    background-color: #4a90e2;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    font-family: Arial, sans-serif;
  }

  button#generateBtn:hover {
    background-color: #357abd;
  }

  button#generateBtn:disabled {
    background-color: #aaa;
    cursor: not-allowed;
  }

  #error-msg {
    background: #ffe0e0;
    color: #c00;
    border: 1px solid #f5c6c6;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }

  #output-section {
    display: none;
  }

  .output-label {
    font-weight: bold;
    font-size: 14px;
    color: #555;
    margin-bottom: 8px;
  }

  #response-box {
    background: #f9f9f9;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 80px;
    color: #333;
  }

  #loading-msg {
    text-align: center;
    color: #888;
    font-size: 14px;
    padding: 20px;
    display: none;
  }

  .copy-btn {
    margin-top: 10px;
    padding: 7px 14px;
    background: white;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    color: #555;
    font-family: Arial, sans-serif;
  }

  .copy-btn:hover {
    background: #f0f0f0;
  }

  .mode-info {
    font-size: 13px;
    color: #888;
    margin-top: 8px;
    padding: 8px 10px;
    background: #f7f7f7;
    border-left: 3px solid #4a90e2;
    border-radius: 0 4px 4px 0;
  }
</style>
</head>
<body>

<h1>🤖 AI Prompt Playground</h1>
<p class="subtitle">A simple app to try different AI prompt styles</p>

<div class="card">
  <label for="modeSelect">1. Choose a mode:</label>
  <select id="modeSelect" onchange="updateModeInfo()">
    <option value="eli5">Explain Like I'm 5</option>
    <option value="professional">Professional Rewrite</option>
    <option value="quiz">Quiz Generator</option>
    <option value="studyplan">Study Plan</option>
  </select>
  <div class="mode-info" id="modeInfo">Explains things in very simple words, like you're explaining to a little kid!</div>
</div>

<div class="card">
  <label for="userInput">2. Enter your text or topic:</label>
  <textarea id="userInput" placeholder="Type something here..." oninput="updateChar()"></textarea>
  <div class="char-info"><span id="charCount">0</span> / 1000 characters</div>
  <div id="error-msg">⚠️ Please type something before clicking Generate!</div>
  <button id="generateBtn" onclick="generate()">✨ Generate</button>
</div>

<div class="card" id="output-section">
  <div class="output-label">3. Result:</div>
  <div id="loading-msg">⏳ Thinking... please wait...</div>
  <div id="response-box"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyResult()" style="display:none;">📋 Copy to clipboard</button>
</div>

<script>
  const modeDescriptions = {
    eli5: "Explains things in very simple words, like you're explaining to a little kid!",
    professional: "Rewrites your text to sound more professional and formal.",
    quiz: "Generates 5 quiz questions based on your topic.",
    studyplan: "Creates a simple study plan to help you learn something new."
  };

  const systemPrompts = {
    eli5: "You are explaining things to a 5-year-old child. Use very simple words and short sentences. No big words. Be friendly and fun. Use examples kids would understand like toys, cartoons, or food.",
    professional: "You are a professional editor. Rewrite the user's text to sound formal and professional. Fix any grammar issues. Keep the same meaning but make it sound polished. Only output the rewritten text, nothing else.",
    quiz: "You are a teacher creating a quiz. Based on the user's topic, generate exactly 5 multiple choice questions. Each question should have 4 options (A, B, C, D) and clearly mark the correct answer at the end of each question.",
    studyplan: "You are a helpful study coach. Create a simple 4-week study plan for the user's topic. For each week, list 3 things to do or learn. Keep it simple and encouraging. Use bullet points."
  };

  function updateModeInfo() {
    const mode = document.getElementById('modeSelect').value;
    document.getElementById('modeInfo').textContent = modeDescriptions[mode];
  }

  function updateChar() {
    const len = document.getElementById('userInput').value.length;
    document.getElementById('charCount').textContent = len;
  }

  async function generate() {
    const input = document.getElementById('userInput').value.trim();
    const mode = document.getElementById('modeSelect').value;
    const errDiv = document.getElementById('error-msg');
    const outputSection = document.getElementById('output-section');
    const responseBox = document.getElementById('response-box');
    const loadingMsg = document.getElementById('loading-msg');
    const btn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');

    // check if empty
    if (input === '') {
      errDiv.style.display = 'block';
      return;
    }
    errDiv.style.display = 'none';

    // show output card and loading
    outputSection.style.display = 'block';
    responseBox.textContent = '';
    copyBtn.style.display = 'none';
    loadingMsg.style.display = 'block';
    btn.disabled = true;
    btn.textContent = 'Generating...';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': 'YOUR_API_KEY_HERE',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompts[mode],
          messages: [
            { role: 'user', content: input }
          ]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || 'Something went wrong with the API');
      }

      const text = data.content[0].text;
      loadingMsg.style.display = 'none';
      responseBox.textContent = text;
      copyBtn.style.display = 'inline-block';

    } catch (err) {
      loadingMsg.style.display = 'none';
      responseBox.textContent = 'Error: ' + err.message;
    }

    btn.disabled = false;
    btn.textContent = '✨ Generate';
  }

  function copyResult() {
    const text = document.getElementById('response-box').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => { btn.textContent = '📋 Copy to clipboard'; }, 2000);
    });
  }
</script>

</body>
</html>
